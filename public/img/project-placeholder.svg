<svg width="556" height="1200" viewBox="0 0 556 1200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2a2a2a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00ff88;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#00ccff;stop-opacity:0.8" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="556" height="1200" fill="url(#bgGradient)" rx="16"/>
  
  <!-- Border -->
  <rect x="1" y="1" width="554" height="1198" fill="none" stroke="#333" stroke-width="1" rx="15"/>
  
  <!-- Top accent bar -->
  <rect x="0" y="0" width="556" height="4" fill="url(#accentGradient)" rx="16"/>
  
  <!-- Code icon -->
  <g transform="translate(278, 400)">
    <circle cx="0" cy="0" r="60" fill="#333" stroke="#555" stroke-width="2"/>
    <path d="M-30 -15 L-15 0 L-30 15" stroke="url(#accentGradient)" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M30 -15 L15 0 L30 15" stroke="url(#accentGradient)" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M-5 -20 L5 20" stroke="url(#accentGradient)" stroke-width="3" stroke-linecap="round"/>
  </g>
  
  <!-- Main text -->
  <text x="278" y="520" text-anchor="middle" fill="#fff" font-family="Arial, sans-serif" font-size="24" font-weight="600">
    Proyecto en Desarrollo
  </text>
  
  <!-- Subtitle -->
  <text x="278" y="560" text-anchor="middle" fill="#aaa" font-family="Arial, sans-serif" font-size="16">
    Vista previa próximamente
  </text>
  
  <!-- Decorative elements -->
  <g opacity="0.3">
    <!-- Grid pattern -->
    <defs>
      <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
        <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#444" stroke-width="1"/>
      </pattern>
    </defs>
    <rect width="556" height="1200" fill="url(#grid)"/>
  </g>
  
  <!-- Loading dots animation -->
  <g transform="translate(278, 650)">
    <circle cx="-20" cy="0" r="4" fill="#00ff88">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="1.5s" repeatCount="indefinite" begin="0s"/>
    </circle>
    <circle cx="0" cy="0" r="4" fill="#00ff88">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="1.5s" repeatCount="indefinite" begin="0.5s"/>
    </circle>
    <circle cx="20" cy="0" r="4" fill="#00ff88">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="1.5s" repeatCount="indefinite" begin="1s"/>
    </circle>
  </g>
</svg> 